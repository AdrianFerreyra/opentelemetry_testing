receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317   # FastAPI app sends here
      http:
        endpoint: 0.0.0.0:4318   # HTTP fallback (useful for curl debugging)

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  # Metrics: Prometheus pulls from this endpoint
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "otel"

  # Traces: push to Tempo via OTLP gRPC
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Debug: print everything to collector stdout (great for development)
  debug:
    verbosity: detailed

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679    # Browser: http://localhost:55679/debug/tracez

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]

  telemetry:
    logs:
      level: "info"
