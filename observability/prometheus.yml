global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape metrics exported by the OTel Collector
  - job_name: "otelcollector"
    static_configs:
      - targets: ["otelcollector:8889"]

  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
